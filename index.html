<!DOCTYPE html>
<html>
<head>
    <title>ABC Technologies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Welcome to ABC Technologies</h1>
    <h2>Ask your Query</h2>

    <form method="POST">
        <input type="text" name="query" placeholder="Ask a question..." required>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
        <div class="answer">
            <h3>Answer:</h3>
            <p>{{ answer }}</p>
        </div>
    {% endif %}

</div>

</body>
</html>
